<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">

  <style>
    /* ── Tokens ─────────────────────────────────────────────── */
    :root {
      --bg:           #0c0c0f;
      --surface:      #16161a;
      --surface-2:    #1e1e24;
      --surface-3:    #26262e;
      --border:       #2a2a34;
      --border-focus: #6c63f0;
      --accent:       #6c63f0;
      --accent-dim:   #4138b0;
      --accent-glow:  rgba(108, 99, 240, 0.2);
      --self-bg:      #251f5e;
      --self-text:    #ccc8ff;
      --other-bg:     #1e1e24;
      --other-text:   #c4c4d4;
      --text:         #e6e6f0;
      --text-dim:     #8888a0;
      --muted:        #4a4a60;
      --success:      #3dd68c;
      --danger:       #f87171;
      --warn:         #fbbf24;
      --radius:       16px;
      --radius-sm:    10px;
      --font:         'DM Sans', sans-serif;
      --mono:         'DM Mono', monospace;
    }

    /* ── Reset ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background-image:
        radial-gradient(ellipse 55% 45% at 15% 5%,  rgba(108,99,240,.07) 0%, transparent 65%),
        radial-gradient(ellipse 40% 35% at 85% 95%, rgba(65,56,176,.05)  0%, transparent 60%);
    }

    /* ── Auth screen ─────────────────────────────────────────── */
    #auth-screen {
      width: 100%;
      max-width: 380px;
      animation: fadeUp .35s ease both;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px 28px;
      box-shadow: 0 24px 64px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.03);
    }

    .auth-logo {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dim));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .auth-title {
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: -.01em;
      margin-bottom: 4px;
    }

    .auth-subtitle {
      font-size: .8rem;
      color: var(--text-dim);
      margin-bottom: 28px;
      font-family: var(--mono);
    }

    /* Tabs */
    .auth-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface-2);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 24px;
    }

    .auth-tab {
      flex: 1;
      padding: 7px;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: var(--text-dim);
      font-family: var(--font);
      font-size: .8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
    }

    .auth-tab.active {
      background: var(--surface-3);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,.4);
    }

    /* Fields */
    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: .73rem;
      font-family: var(--mono);
      color: var(--text-dim);
      margin-bottom: 6px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .field input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font);
      font-size: .875rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      caret-color: var(--accent);
    }

    .field input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .field input::placeholder { color: var(--muted); }

    /* Submit button */
    .auth-btn {
      width: 100%;
      padding: 11px;
      margin-top: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dim));
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-family: var(--font);
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 20px var(--accent-glow);
      position: relative;
      overflow: hidden;
    }

    .auth-btn:hover:not(:disabled) {
      opacity: .9;
      transform: translateY(-1px);
      box-shadow: 0 8px 28px var(--accent-glow);
    }

    .auth-btn:active:not(:disabled) { transform: translateY(0); }

    .auth-btn:disabled { opacity: .45; cursor: not-allowed; }

    .auth-btn .btn-spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto;
    }

    .auth-btn.loading .btn-label { display: none; }
    .auth-btn.loading .btn-spinner { display: block; }

    /* Error message */
    .auth-error {
      font-size: .78rem;
      color: var(--danger);
      font-family: var(--mono);
      margin-top: 12px;
      min-height: 18px;
      text-align: center;
      opacity: 0;
      transition: opacity .2s;
    }

    .auth-error.visible { opacity: 1; }

    /* ── Chat screen ─────────────────────────────────────────── */
    #chat-screen {
      display: none;
      width: 100%;
      max-width: 460px;
      height: 90vh;
      max-height: 780px;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 24px 64px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.03);
      overflow: hidden;
      animation: fadeUp .3s ease both;
    }

    #chat-screen.visible { display: flex; }

    /* Header */
    #header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #header-icon {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dim));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }

    #header-info { flex: 1; }

    #header-title {
      font-size: .875rem;
      font-weight: 600;
    }

    #header-status {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 2px;
    }

    #status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background .3s, box-shadow .3s;
    }

    #status-dot.online {
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      animation: pulse 2.5s ease infinite;
    }

    #status-text {
      font-size: .68rem;
      color: var(--text-dim);
      font-family: var(--mono);
    }

    /* Logout button */
    #logout-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: .68rem;
      padding: 5px 10px;
      cursor: pointer;
      transition: color .2s, border-color .2s;
      flex-shrink: 0;
    }

    #logout-btn:hover { color: var(--danger); border-color: var(--danger); }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      list-style: none;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    #messages:empty::after {
      content: 'No messages yet';
      display: block;
      text-align: center;
      color: var(--muted);
      font-size: .75rem;
      font-family: var(--mono);
      margin: auto;
    }

    /* System messages (join/leave) */
    .msg-system {
      text-align: center;
      font-size: .68rem;
      font-family: var(--mono);
      color: var(--muted);
      padding: 4px 0;
    }

    /* Chat bubbles */
    .msg { display: flex; max-width: 82%; }
    .msg.self  { align-self: flex-end; }
    .msg.other { align-self: flex-start; }

    .bubble {
      padding: 8px 12px 6px;
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .msg.self .bubble {
      background: var(--self-bg);
      border: 1px solid rgba(108,99,240,.25);
      border-bottom-right-radius: 4px;
      color: var(--self-text);
    }

    .msg.other .bubble {
      background: var(--other-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--other-text);
    }

    .msg-user {
      font-size: .67rem;
      font-family: var(--mono);
      color: var(--accent);
      font-weight: 500;
    }

    .msg-text {
      font-size: .86rem;
      line-height: 1.45;
      word-break: break-word;
    }

    .msg-time {
      font-size: .6rem;
      font-family: var(--mono);
      color: var(--muted);
      align-self: flex-end;
      margin-top: 2px;
    }

    /* Form */
    #form-wrapper {
      border-top: 1px solid var(--border);
      padding: 8px 10px 10px;
      flex-shrink: 0;
    }

    #char-count {
      text-align: right;
      font-size: .62rem;
      font-family: var(--mono);
      color: var(--muted);
      margin-bottom: 5px;
      height: 13px;
      transition: color .2s;
    }

    #char-count.warn { color: var(--warn); }
    #char-count.over { color: var(--danger); }

    #form {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #input {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 50px;
      color: var(--text);
      font-family: var(--font);
      font-size: .86rem;
      padding: 9px 16px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      caret-color: var(--accent);
    }

    #input::placeholder { color: var(--muted); }

    #input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #send-btn {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-dim));
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 2px 12px var(--accent-glow);
    }

    #send-btn svg { width: 16px; height: 16px; fill: #fff; transform: translateX(1px); }
    #send-btn:hover:not(:disabled) { opacity: .9; transform: scale(1.07); box-shadow: 0 4px 18px var(--accent-glow); }
    #send-btn:active:not(:disabled) { transform: scale(.94); }
    #send-btn:disabled { opacity: .3; cursor: not-allowed; box-shadow: none; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: .75rem;
      font-family: var(--mono);
      padding: 7px 16px;
      border-radius: 50px;
      opacity: 0;
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
      max-width: 90vw;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toast.toast-error   { border-color: var(--danger);  color: var(--danger); }
    .toast.toast-success { border-color: var(--success); color: var(--success); }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .45; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

  <!-- ── Auth screen ──────────────────────────────────────── -->
  <div id="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">💬</div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to continue</p>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Login</button>
        <button class="auth-tab" data-tab="register">Register</button>
      </div>

      <form id="auth-form" novalidate>
        <div class="field">
          <label for="auth-username">Username</label>
          <input
            type="text"
            id="auth-username"
            placeholder="your_username"
            autocomplete="username"
            spellcheck="false"
            maxlength="20"
          />
        </div>
        <div class="field">
          <label for="auth-password">Password</label>
          <input
            type="password"
            id="auth-password"
            placeholder="••••••••"
            autocomplete="current-password"
            maxlength="72"
          />
        </div>
        <button type="submit" class="auth-btn" id="auth-submit">
          <span class="btn-label">Sign in</span>
          <span class="btn-spinner"></span>
        </button>
      </form>

      <p class="auth-error" id="auth-error"></p>
    </div>
  </div>

  <!-- ── Chat screen ──────────────────────────────────────── -->
  <section id="chat-screen">
    <header id="header">
      <div id="header-icon">💬</div>
      <div id="header-info">
        <div id="header-title">General</div>
        <div id="header-status">
          <span id="status-dot"></span>
          <span id="status-text">Connecting…</span>
        </div>
      </div>
      <button id="logout-btn">logout</button>
    </header>

    <ul id="messages"></ul>

    <div id="form-wrapper">
      <div id="char-count">0/500</div>
      <form id="form">
        <input
          type="text"
          id="input"
          placeholder="Write a message…"
          autocomplete="off"
          maxlength="500"
          aria-label="Message input"
        />
        <button type="submit" id="send-btn" disabled aria-label="Send">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </form>
    </div>
  </section>

  <script type="module">
    import { io } from 'https://cdn.socket.io/4.3.2/socket.io.esm.min.js'

    /* ── Utils ───────────────────────────────────────────────── */
    const escapeHTML = (str) =>
      String(str)
        .replace(/&/g,  '&amp;')
        .replace(/</g,  '&lt;')
        .replace(/>/g,  '&gt;')
        .replace(/"/g,  '&quot;')
        .replace(/'/g,  '&#039;')

    const formatTime = () =>
      new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })

    const getServerOffset = () =>
      parseInt(localStorage.getItem('serverOffset') ?? '0', 10)

    /* ── Toast ───────────────────────────────────────────────── */
    function showToast(msg, type = 'info') {
      const t = document.createElement('div')
      t.className = `toast toast-${type}`
      t.textContent = msg
      document.body.appendChild(t)
      requestAnimationFrame(() => t.classList.add('show'))
      setTimeout(() => {
        t.classList.remove('show')
        setTimeout(() => t.remove(), 300)
      }, 3000)
    }

    /* ── Auth state ──────────────────────────────────────────── */
    let currentUser = null
    let socket      = null

    const getToken    = ()    => localStorage.getItem('token')
    const getUsername = ()    => localStorage.getItem('username')
    const saveSession = (t,u) => { localStorage.setItem('token', t); localStorage.setItem('username', u) }
    const clearSession= ()    => { localStorage.removeItem('token'); localStorage.removeItem('username'); localStorage.removeItem('serverOffset') }

    /* ── DOM ─────────────────────────────────────────────────── */
    const authScreen   = document.getElementById('auth-screen')
    const chatScreen   = document.getElementById('chat-screen')
    const authForm     = document.getElementById('auth-form')
    const authUsername = document.getElementById('auth-username')
    const authPassword = document.getElementById('auth-password')
    const authSubmit   = document.getElementById('auth-submit')
    const authError    = document.getElementById('auth-error')
    const authTabs     = document.querySelectorAll('.auth-tab')
    const statusDot    = document.getElementById('status-dot')
    const statusText   = document.getElementById('status-text')
    const logoutBtn    = document.getElementById('logout-btn')
    const messages     = document.getElementById('messages')
    const form         = document.getElementById('form')
    const input        = document.getElementById('input')
    const sendBtn      = document.getElementById('send-btn')
    const charCount    = document.getElementById('char-count')
    const MAX_LEN      = 500

    /* ── Auth UI ─────────────────────────────────────────────── */
    let activeTab = 'login'

    authTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        authTabs.forEach(t => t.classList.remove('active'))
        tab.classList.add('active')
        activeTab = tab.dataset.tab
        authSubmit.querySelector('.btn-label').textContent =
          activeTab === 'login' ? 'Sign in' : 'Create account'
        setAuthError('')
      })
    })

    function setAuthError(msg) {
      authError.textContent = msg
      authError.classList.toggle('visible', !!msg)
    }

    function setAuthLoading(on) {
      authSubmit.disabled = on
      authSubmit.classList.toggle('loading', on)
    }

    authForm.addEventListener('submit', async (e) => {
      e.preventDefault()
      const username = authUsername.value.trim()
      const password = authPassword.value

      if (!username || !password) return setAuthError('Please fill in all fields')

      setAuthLoading(true)
      setAuthError('')

      try {
        const res  = await fetch(`/auth/${activeTab}`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username, password })
        })
        const data = await res.json()

        if (!res.ok) {
          setAuthError(data.error ?? 'Something went wrong')
        } else {
          saveSession(data.token, data.username)
          enterChat(data.token, data.username)
        }
      } catch {
        setAuthError('Could not reach the server')
      } finally {
        setAuthLoading(false)
      }
    })

    /* ── Chat init ───────────────────────────────────────────── */
    function enterChat(token, username) {
      currentUser = username
      authScreen.style.display  = 'none'
      chatScreen.classList.add('visible')
      input.focus()
      connectSocket(token, username)
    }

    function connectSocket(token, username) {
      socket = io({
        auth: { token, serverOffset: getServerOffset() }
      })

      socket.on('connect', () => {
        statusDot.classList.add('online')
        statusText.textContent = username
        sendBtn.disabled = false
      })

      socket.on('disconnect', () => {
        statusDot.classList.remove('online')
        statusText.textContent = 'Reconnecting…'
        sendBtn.disabled = true
      })

      socket.on('connect_error', (err) => {
        if (err.message === 'AUTH_REQUIRED' || err.message === 'AUTH_INVALID') {
          clearSession()
          location.reload()
        }
      })

      socket.on('error', (msg) => showToast(msg, 'error'))

      socket.on('user:joined', (user) => addSystemMsg(`${escapeHTML(user)} joined`))
      socket.on('user:left',   (user) => addSystemMsg(`${escapeHTML(user)} left`))

      socket.on('chat message', (msg, serverOffset, msgUsername) => {
        const isSelf   = msgUsername === currentUser
        const safeMsg  = escapeHTML(msg)
        const safeUser = escapeHTML(msgUsername)
        const time     = formatTime()

        const li = document.createElement('li')
        li.className = `msg ${isSelf ? 'self' : 'other'}`
        li.innerHTML = `
          <div class="bubble">
            ${!isSelf ? `<span class="msg-user">${safeUser}</span>` : ''}
            <p class="msg-text">${safeMsg}</p>
            <span class="msg-time">${time}</span>
          </div>`

        li.style.cssText = `opacity:0; transform:translateX(${isSelf ? '10px' : '-10px'})`
        messages.appendChild(li)
        requestAnimationFrame(() => {
          li.style.transition = 'opacity .2s ease, transform .2s ease'
          li.style.opacity    = '1'
          li.style.transform  = 'translateX(0)'
        })

        socket.auth.serverOffset = serverOffset
        localStorage.setItem('serverOffset', serverOffset)
        messages.scrollTo({ top: messages.scrollHeight, behavior: 'smooth' })
      })
    }

    function addSystemMsg(text) {
      const li = document.createElement('li')
      li.className   = 'msg-system'
      li.textContent = text
      messages.appendChild(li)
      messages.scrollTo({ top: messages.scrollHeight, behavior: 'smooth' })
    }

    /* ── Chat form ───────────────────────────────────────────── */
    input.addEventListener('input', () => {
      const len = input.value.length
      charCount.textContent = `${len}/${MAX_LEN}`
      charCount.classList.toggle('warn', len > MAX_LEN * .85)
      charCount.classList.toggle('over', len > MAX_LEN)
      sendBtn.disabled = len === 0 || len > MAX_LEN
    })

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitMessage() }
    })

    form.addEventListener('submit', (e) => { e.preventDefault(); submitMessage() })

    function submitMessage() {
      const msg = input.value.trim()
      if (!msg || msg.length > MAX_LEN || !socket?.connected) return
      socket.emit('chat message', msg)
      input.value = ''
      charCount.textContent = `0/${MAX_LEN}`
      sendBtn.disabled = true
      input.focus()
    }

    /* ── Logout ──────────────────────────────────────────────── */
    logoutBtn.addEventListener('click', () => {
      socket?.disconnect()
      clearSession()
      location.reload()
    })

    /* ── Auto-login if token exists ──────────────────────────── */
    const savedToken    = getToken()
    const savedUsername = getUsername()
    if (savedToken && savedUsername) {
      enterChat(savedToken, savedUsername)
    }
  </script>
</body>
</html>
